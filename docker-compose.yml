version: '3.9'

# =============================================================================
# Atlas Engineering OS — Local Development Stack
# =============================================================================
# Usage:
#   docker compose up -d           # Start all services
#   docker compose up -d postgres  # Start specific service
#   docker compose logs -f api     # Follow logs
#   docker compose down -v         # Stop and remove volumes
# =============================================================================

name: atlas-dev

services:
  # ===========================================================================
  # Primary Database — PostgreSQL 16
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ===========================================================================
  # Knowledge Graph — Neo4j 5
  # ===========================================================================
  neo4j:
    image: neo4j:5.18-community
    container_name: atlas-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/atlas_neo4j_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - atlas-network

  # ===========================================================================
  # Vector Database — Qdrant
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: atlas-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ===========================================================================
  # Cache & Sessions — Redis 7
  # ===========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: atlas-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ===========================================================================
  # Event Streaming — Apache Kafka + Zookeeper
  # ===========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: atlas-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - atlas-network
    healthcheck:
      test: echo srvr | nc localhost 2181 | grep Mode
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: atlas-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - atlas-network

  # ===========================================================================
  # Object Storage — MinIO (S3-compatible)
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: atlas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # Console UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - atlas-network

  # ===========================================================================
  # Observability — OpenTelemetry Collector
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: atlas-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    depends_on:
      - jaeger
      - prometheus
    networks:
      - atlas-network

  # Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: atlas-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - atlas-network

  # Metrics
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: atlas-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - atlas-network

  # Dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: atlas-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: atlas_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    networks:
      - atlas-network

  # ===========================================================================
  # Identity & Auth — Keycloak
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: atlas-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: atlas_keycloak_admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: atlas_user
      KC_DB_PASSWORD: atlas_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - atlas-network

  # ===========================================================================
  # Secrets Management — HashiCorp Vault (Dev mode)
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.16
    container_name: atlas-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: atlas-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "vault status"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: atlas-postgres-data
  neo4j-data:
    name: atlas-neo4j-data
  neo4j-logs:
    name: atlas-neo4j-logs
  neo4j-plugins:
    name: atlas-neo4j-plugins
  qdrant-data:
    name: atlas-qdrant-data
  redis-data:
    name: atlas-redis-data
  kafka-data:
    name: atlas-kafka-data
  minio-data:
    name: atlas-minio-data
  prometheus-data:
    name: atlas-prometheus-data
  grafana-data:
    name: atlas-grafana-data

# =============================================================================
# Networks
# =============================================================================
networks:
  atlas-network:
    name: atlas-network
    driver: bridge
